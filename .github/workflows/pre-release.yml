name: Pre-Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  TagAndPublish:
    name: Tag and Notify Go Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Full History
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.2.0

      - name: Calculate Version
        id: version
        uses: gittools/actions/gitversion/execute@v4.2.0

      - name: Tag Commit
        uses: hydn-co/build-tools/.github/actions/create-tag@main
        with:
          semver: ${{ steps.version.outputs.semVer }}

      - name: Notify Go Proxy
        uses: hydn-co/build-tools/.github/actions/notify-go-proxy@main
        with:
          module: github.com/${{ github.repository }}
          version: ${{ steps.version.outputs.semVer }}

      - name: Prune Pre-release Tags
        uses: hydn-co/build-tools/.github/actions/prune-tags@main

